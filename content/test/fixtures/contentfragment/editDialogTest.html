<div class="cmp-contentfragment__editor">
    <div data-component-path="/content/test-page/jcr:content/root/cf"></div>

    <coral-tabview></coral-tabview>

    <input name="./fragmentPath" value="/content/dam/test/my-fragment">

    <div data-display-mode-radio-group="true">
        <input type="radio" name="./displayMode" value="singleText">
        <input type="radio" name="./displayMode" value="multi">
        <input type="radio" name="./displayMode" value="vcf" checked>
    </div>

    <div data-element-mode-field="true">
        <div data-element-names-container="true"
             data-field-path="/apps/test/dialog/elementNames">
            <div data-granite-coral-multifield-name="./elementNames"></div>
            <select data-single-text-selector="true" name="./elementNames"></select>
        </div>
    </div>

    <div data-vcf-mode-field="true">
        <div data-vcf-template-selector="true"></div>
    </div>

    <select name="./variationName"
            data-field-path="/apps/test/dialog/variationName"></select>

    <fieldset class="cmp-contentfragment__editor-paragraph-controls">
        <input type="radio" name="./paragraphScope" value="all" checked>
        <input type="radio" name="./paragraphScope" value="range">
        <input name="./paragraphRange">
        <input name="./paragraphHeadings">
    </fieldset>
</div>
